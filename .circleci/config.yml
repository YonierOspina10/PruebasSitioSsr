workflows:
  version: 2
  deploy:
    jobs:
      - build-and-deploy:
          filters:
            branches:
              only:
                -  /^bugfix\/.*/
                -  /^feature\/.*/

      - build-and-deploy-enviromentdev:
          filters:
            branches:
              only:
                -  enviromentdev

      - build-and-deploy-main:
          filters:
            branches:
              only:
                -  main
